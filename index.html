<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToeicHolic - Lộ trình chinh phục TOEIC</title>
    <style>
        /* CSS đắp giao diện cơ bản cho chuẩn dân làm Marketing */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background-color: #f0f2f5; color: #333; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 500px; width: 90%; text-align: center; }
        h1 { color: #1877f2; margin-bottom: 10px; }
        p.subtitle { color: #666; margin-bottom: 30px; font-size: 15px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="email"] { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        input[type="text"]:focus, input[type="email"]:focus { border-color: #1877f2; outline: none; }
        button { background-color: #1877f2; color: white; padding: 14px 20px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background-color 0.3s; }
        button:hover { background-color: #166fe5; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 ToeicHolic Sắp Ra Mắt!</h1>
        <p class="subtitle">Hệ thống đang được nâng cấp. Để lại Email để nhận ngay bộ tài liệu "Phá đảo TOEIC 800+" miễn phí ngay khi web hoạt động!</p>

        <form action="https://formspree.io/f/THAY_MA_CUA_BAN_VAO_DAY" method="POST">
            
            <div class="form-group">
                <label for="name">Họ và Tên của bạn:</label>
                <input type="text" id="name" name="name" required placeholder="Nhập họ tên...">
            </div>

            <div class="form-group">
                <label for="email">Địa chỉ Email:</label>
                <input type="email" id="email" name="email" required placeholder="Nhập email nhận tài liệu...">
            </div>

            <button type="submit">Nhận Tài Liệu Ngay 🚀</button>

        </form>
        </div>

</body>
</html>
